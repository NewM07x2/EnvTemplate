name: Flutter CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.1'
        channel: 'stable'
        
    - name: Get dependencies
      working-directory: ./app
      run: flutter pub get
      
    - name: Verify formatting
      working-directory: ./app
      run: dart format --output=none --set-exit-if-changed .
      
    - name: Analyze project source
      working-directory: ./app
      run: flutter analyze
      
    - name: Run tests
      working-directory: ./app
      run: flutter test
      
  build-android:
    needs: analyze-and-test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.1'
        channel: 'stable'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Get dependencies
      working-directory: ./app
      run: flutter pub get
      
    - name: Create dummy .env.dev
      working-directory: ./app
      run: |
        echo "APP_ENV=dev" > .env.dev
        echo "SUPABASE_URL=https://dummy.supabase.co" >> .env.dev
        echo "SUPABASE_ANON_KEY=dummy-key" >> .env.dev
        echo "ENABLE_ANALYTICS=false" >> .env.dev
        echo "ENABLE_CRASHLYTICS=false" >> .env.dev
        echo "ENABLE_MESSAGING=false" >> .env.dev
        
    - name: Build APK (debug)
      working-directory: ./app
      run: flutter build apk --debug --dart-define=APP_ENV=dev
      
  build-ios:
    needs: analyze-and-test
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.1'
        channel: 'stable'
        
    - name: Get dependencies
      working-directory: ./app
      run: flutter pub get
      
    - name: Create dummy .env.dev
      working-directory: ./app
      run: |
        echo "APP_ENV=dev" > .env.dev
        echo "SUPABASE_URL=https://dummy.supabase.co" >> .env.dev
        echo "SUPABASE_ANON_KEY=dummy-key" >> .env.dev
        echo "ENABLE_ANALYTICS=false" >> .env.dev
        echo "ENABLE_CRASHLYTICS=false" >> .env.dev
        echo "ENABLE_MESSAGING=false" >> .env.dev
        
    - name: Build iOS (no codesign)
      working-directory: ./app
      run: flutter build ios --debug --no-codesign --dart-define=APP_ENV=dev
